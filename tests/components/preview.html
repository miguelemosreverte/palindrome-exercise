<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root { --ink: #112033; --slate: #56708a; --ocean: #316dff; --mint: #89e0c8; --line: rgba(17,32,51,0.08); --shadow-soft: 0 20px 50px rgba(75,133,178,0.14); }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Instrument Sans', system-ui, sans-serif; color: var(--ink); background: linear-gradient(180deg, #bcecff 0%, #d8f5f1 42%, #f7f6ef 100%); min-height: 100vh; }

    .gallery-header { padding: 40px 20px 20px; max-width: 1100px; margin: 0 auto; }
    .gallery-header h1 { font-size: 32px; font-weight: 800; }
    .gallery-header p { color: var(--slate); margin-top: 6px; }

    .gallery-nav { position: sticky; top: 0; z-index: 10; background: rgba(247,246,239,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .gallery-nav a { padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--slate); text-decoration: none; border: 1px solid transparent; }
    .gallery-nav a:hover { background: rgba(255,255,255,0.6); color: var(--ink); }
    .gallery-nav a.active { background: var(--ocean); color: white; }

    .section { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
    .section-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .section-title code { font-size: 14px; background: rgba(0,0,0,0.06); padding: 2px 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
    .section-desc { font-size: 14px; color: var(--slate); margin-bottom: 20px; }

    .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
    .scenario { border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.5); overflow: hidden; }
    .scenario-label { padding: 10px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; color: var(--slate); border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.3); }
    .scenario-body { padding: 16px; }

    /* All component styles from chat.html */
    .rc-timeline { padding: 8px 0; }
    .rc-timeline-item { display: flex; gap: 16px; position: relative; padding-bottom: 24px; }
    .rc-timeline-item:last-child { padding-bottom: 0; }
    .rc-timeline-track { display: flex; flex-direction: column; align-items: center; width: 20px; flex-shrink: 0; }
    .rc-timeline-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--ocean); border: 3px solid rgba(49,109,255,0.2); z-index: 1; flex-shrink: 0; }
    .rc-timeline-line { width: 2px; flex: 1; background: var(--line); margin-top: 4px; }
    .rc-timeline-item:last-child .rc-timeline-line { display: none; }
    .rc-timeline-content { flex: 1; }
    .rc-timeline-date { font-size: 12px; font-weight: 700; color: var(--ocean); margin-bottom: 2px; }
    .rc-timeline-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .rc-timeline-desc { font-size: 13px; color: var(--slate); line-height: 1.5; margin-top: 2px; }

    .rc-options { display: flex; flex-direction: column; gap: 10px; }
    .rc-option { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s; }
    .rc-option:hover { background: rgba(255,255,255,0.9); box-shadow: var(--shadow-soft); transform: translateY(-1px); }
    .rc-option.selected { border-color: var(--ocean); background: rgba(49,109,255,0.06); }
    .rc-option-body { flex: 1; }
    .rc-option-title { font-size: 15px; font-weight: 700; }
    .rc-option-desc { font-size: 13px; color: var(--slate); line-height: 1.5; margin-top: 2px; }
    .rc-option-arrow { color: var(--slate); opacity: 0.4; font-size: 18px; }
    .rc-option.selected .rc-option-arrow { color: var(--ocean); opacity: 1; }

    .rc-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .rc-card { padding: 16px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,0.5); }
    .rc-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--slate); font-weight: 700; }
    .rc-card-value { font-size: 24px; font-weight: 800; margin-top: 6px; line-height: 1; }
    .rc-card-desc { font-size: 12px; color: var(--slate); margin-top: 4px; }

    .rc-table { width: 100%; border-collapse: collapse; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: rgba(255,255,255,0.5); }
    .rc-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--slate); font-weight: 700; text-align: left; padding: 10px 14px; border-bottom: 2px solid var(--line); }
    .rc-table td { font-size: 13px; padding: 8px 14px; border-bottom: 1px solid var(--line); }
    .rc-table tr:last-child td { border-bottom: none; }

    .rc-steps { display: flex; flex-direction: column; }
    .rc-step { display: flex; gap: 12px; padding: 12px 0; }
    .rc-step-num { width: 28px; height: 28px; border-radius: 8px; background: var(--ocean); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
    .rc-step-body { flex: 1; padding-top: 2px; }
    .rc-step-title { font-size: 14px; font-weight: 700; }
    .rc-step-desc { font-size: 12px; color: var(--slate); line-height: 1.5; margin-top: 2px; }
    .rc-step + .rc-step { border-top: 1px solid var(--line); }

    .ptree-breadcrumbs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 14px; }
    .ptree-crumb { padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid rgba(49,109,255,0.2); background: rgba(49,109,255,0.06); color: var(--ocean); }
    .ptree-sep { color: var(--slate); opacity: 0.3; }
    .ptree-question { font-size: 17px; font-weight: 800; margin-bottom: 12px; }
    .ptree-choices { display: flex; flex-direction: column; gap: 8px; }
    .ptree-choice { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s; }
    .ptree-choice:hover { background: rgba(255,255,255,0.9); box-shadow: var(--shadow-soft); transform: translateY(-1px); }
    .ptree-choice-body { flex: 1; }
    .ptree-choice-title { font-size: 15px; font-weight: 700; }
    .ptree-choice-desc { font-size: 13px; color: var(--slate); line-height: 1.5; margin-top: 2px; }
    .ptree-choice-arrow { color: var(--slate); opacity: 0.3; }
    .ptree-result { padding: 18px; border-radius: 14px; border: 1px solid rgba(49,109,255,0.15); background: rgba(49,109,255,0.04); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="gallery-header">
    <h1>Component Gallery</h1>
    <p>Visual scenarios for every rich component. Click components to test interactivity.</p>
  </div>

  <nav class="gallery-nav" id="nav"></nav>

  <div id="gallery"></div>

  <script>
    // ─── Scenario definitions ───
    const COMPONENTS = {
      timeline: {
        desc: 'Vertical chronological events with dots and connecting lines.',
        scenarios: {
          'Historia argentina': {
            items: [
              { date: '1816', title: 'Independencia', desc: 'Congreso de Tucumán declara la independencia.' },
              { date: '1853', title: 'Constitución Nacional', desc: 'Se sanciona la primera constitución.' },
              { date: '1946', title: 'Perón presidente' },
              { date: '1976', title: 'Golpe de Estado', desc: 'Comienza la dictadura militar.' },
              { date: '1983', title: 'Retorno a la democracia' },
            ]
          },
          'Solo 2 eventos': {
            items: [
              { date: '2020', title: 'Pandemia COVID-19' },
              { date: '2023', title: 'Elección de Milei' },
            ]
          },
          'Sin descripciones': {
            items: [
              { date: 'Lunes', title: 'Kickoff' },
              { date: 'Martes', title: 'Sprint planning' },
              { date: 'Miércoles', title: 'Development' },
              { date: 'Jueves', title: 'Review' },
              { date: 'Viernes', title: 'Retro' },
            ]
          },
          'Muchos eventos': {
            items: Array.from({length: 12}, (_, i) => ({ date: `${2010+i}`, title: `Evento ${i+1}`, desc: `Descripción del evento número ${i+1}.` }))
          },
        },
        render(data) {
          return `<div class="rc-timeline">${data.items.map(i => `<div class="rc-timeline-item"><div class="rc-timeline-track"><div class="rc-timeline-dot"></div><div class="rc-timeline-line"></div></div><div class="rc-timeline-content"><div class="rc-timeline-date">${i.date}</div><div class="rc-timeline-title">${i.title}</div>${i.desc ? `<div class="rc-timeline-desc">${i.desc}</div>` : ''}</div></div>`).join('')}</div>`;
        }
      },

      options: {
        desc: 'Clickable choice cards. Click to select/deselect.',
        scenarios: {
          'Viaje Argentina': {
            items: [
              { title: 'Naturaleza y aventura', desc: 'Patagonia, Iguazú, Mendoza — montañas, glaciares y selva.' },
              { title: 'Cultura y gastronomía', desc: 'Buenos Aires, Salta — tango, vino y arquitectura.' },
              { title: 'Playa y relax', desc: 'Mar del Plata, Pinamar — costa atlántica y descanso.' },
            ]
          },
          'Solo títulos': {
            items: [
              { title: 'Opción A' },
              { title: 'Opción B' },
              { title: 'Opción C' },
              { title: 'Opción D' },
            ]
          },
          'Muchas opciones': {
            items: Array.from({length: 8}, (_, i) => ({ title: `Opción ${i+1}`, desc: `Descripción detallada de la opción número ${i+1} con texto más largo para ver cómo se ve.` }))
          },
          'Una sola opción': {
            items: [{ title: 'Única opción disponible', desc: 'Solo hay una cosa que podés elegir.' }]
          },
        },
        render(data) {
          return `<div class="rc-options">${data.items.map(i => `<div class="rc-option" onclick="this.classList.toggle('selected')"><div class="rc-option-body"><div class="rc-option-title">${i.title}</div>${i.desc ? `<div class="rc-option-desc">${i.desc}</div>` : ''}</div><div class="rc-option-arrow">→</div></div>`).join('')}</div>`;
        }
      },

      cards: {
        desc: 'Metric/summary cards in a responsive grid.',
        scenarios: {
          'País': {
            items: [
              { label: 'Población', value: '46.2M', desc: 'Estimación 2024' },
              { label: 'Superficie', value: '2.78M km²' },
              { label: 'Idioma', value: 'Español' },
              { label: 'Moneda', value: 'ARS' },
            ]
          },
          '2 cards': {
            items: [
              { label: 'Requests', value: '1,234' },
              { label: 'Errors', value: '12', desc: '0.97% error rate' },
            ]
          },
          'Valores largos': {
            items: [
              { label: 'Revenue', value: '$1,234,567.89', desc: 'Last 30 days' },
              { label: 'Active users', value: '892,341', desc: '+12.3% MoM' },
              { label: 'Avg session', value: '4m 32s' },
            ]
          },
        },
        render(data) {
          return `<div class="rc-cards">${data.items.map(i => `<div class="rc-card"><div class="rc-card-label">${i.label}</div><div class="rc-card-value">${i.value}</div>${i.desc ? `<div class="rc-card-desc">${i.desc}</div>` : ''}</div>`).join('')}</div>`;
        }
      },

      table: {
        desc: 'Structured data table with header row.',
        scenarios: {
          'Ciudades': {
            headers: ['Ciudad', 'Población', 'Provincia'],
            rows: [['Buenos Aires', '15M', 'CABA'], ['Córdoba', '1.5M', 'Córdoba'], ['Rosario', '1.3M', 'Santa Fe'], ['Mendoza', '1.1M', 'Mendoza']]
          },
          'Tabla ancha': {
            headers: ['Nombre', 'Email', 'Plan', 'Uso', 'Saldo', 'Estado'],
            rows: [['Miguel', 'miguel@test.com', 'Pro', '85%', '$12.50', 'Activo'], ['Ana', 'ana@test.com', 'Free', '23%', '$0', 'Trial']]
          },
          'Una fila': {
            headers: ['Key', 'Value'],
            rows: [['API_KEY', 'sk-abc...xyz']]
          },
        },
        render(data) {
          return `<table class="rc-table"><thead><tr>${data.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${data.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
        }
      },

      steps: {
        desc: 'Numbered step-by-step process.',
        scenarios: {
          'Setup': {
            items: [
              { title: 'Creá tu cuenta', desc: 'Registrate con email y contraseña.' },
              { title: 'Elegí un plan', desc: 'Free o Pro.' },
              { title: 'Configurá tu perfil' },
              { title: 'Empezá a usar', desc: 'Listo.' },
            ]
          },
          'Solo títulos': {
            items: [
              { title: 'Clonar el repo' },
              { title: 'npm install' },
              { title: 'Configurar .env' },
              { title: 'npm run dev' },
            ]
          },
          'Muchos pasos': {
            items: Array.from({length: 7}, (_, i) => ({ title: `Paso ${i+1}`, desc: `Instrucciones detalladas para el paso ${i+1} del proceso.` }))
          },
        },
        render(data) {
          return `<div class="rc-steps">${data.items.map((i, n) => `<div class="rc-step"><div class="rc-step-num">${n+1}</div><div class="rc-step-body"><div class="rc-step-title">${i.title}</div>${i.desc ? `<div class="rc-step-desc">${i.desc}</div>` : ''}</div></div>`).join('')}</div>`;
        }
      },

      tree: {
        desc: 'Progressive decision tree. Click to expand, breadcrumbs to go back.',
        scenarios: {
          'Viaje': {
            question: '¿Qué tipo de viaje?',
            choices: [
              { title: 'Naturaleza', desc: 'Montañas y glaciares', children: { question: '¿Qué paisaje?', choices: [
                { title: 'Patagonia', desc: 'Fin del mundo', children: { question: '¿Qué actividad?', choices: [
                  { title: 'Trekking', desc: 'Senderos al Fitz Roy' },
                  { title: 'Navegación', desc: 'Perito Moreno desde el agua' },
                ]}},
                { title: 'Selva', desc: 'Iguazú y misiones' },
              ]}},
              { title: 'Cultura', desc: 'Tango, vino, museos', children: { question: '¿Qué te interesa?', choices: [
                { title: 'Tango', desc: 'Milongas en Buenos Aires' },
                { title: 'Vinos', desc: 'Ruta del vino en Mendoza' },
              ]}},
              { title: 'Playa', desc: 'Costa atlántica' },
            ]
          },
          'Carrera universitaria': {
            question: '¿Qué área te interesa?',
            choices: [
              { title: 'Ciencias', desc: 'Matemática, física, biología', children: { question: '¿Qué rama?', choices: [
                { title: 'Cs. de la Computación' },
                { title: 'Biotecnología' },
                { title: 'Física' },
              ]}},
              { title: 'Humanidades', desc: 'Historia, filosofía, letras' },
              { title: 'Ingeniería', desc: 'Civil, industrial, software' },
            ]
          },
          'Plano (sin children)': {
            question: '¿Qué color preferís?',
            choices: [
              { title: 'Azul', desc: 'Calma y profesionalismo' },
              { title: 'Verde', desc: 'Naturaleza y crecimiento' },
              { title: 'Rojo', desc: 'Energía y pasión' },
            ]
          },
        },
        render(data, containerId) {
          // Progressive tree with local state
          const states = {};
          states[containerId] = { data, path: [] };

          function getNode(path) {
            let node = data;
            for (const step of path) {
              const c = node.choices?.find(c => c.title === step.title);
              if (c?.children) node = c.children; else return null;
            }
            return node;
          }

          function draw() {
            const el = document.getElementById(containerId);
            const s = states[containerId];
            const node = getNode(s.path);
            let h = '';

            if (s.path.length) {
              h += '<div class="ptree-breadcrumbs">';
              s.path.forEach((step, i) => {
                if (i > 0) h += '<span class="ptree-sep">›</span>';
                h += `<span class="ptree-crumb" onclick="window._treeBack('${containerId}',${i})">${step.title}</span>`;
              });
              h += '</div>';
            }

            if (!node) {
              const last = s.path[s.path.length - 1];
              h += `<div class="ptree-result"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--ocean);font-weight:700;margin-bottom:4px;">Selección</div><div style="font-size:16px;font-weight:700;">${last.title}</div><div style="margin-top:6px;font-size:12px;color:var(--ocean);">${s.path.map(p=>p.title).join(' → ')}</div></div>`;
            } else {
              h += `<div class="ptree-question">${node.question || '¿Qué elegís?'}</div><div class="ptree-choices">`;
              for (const c of (node.choices || [])) {
                h += `<div class="ptree-choice" onclick="window._treePick('${containerId}','${c.title.replace(/'/g,"\\'")}')"><div class="ptree-choice-body"><div class="ptree-choice-title">${c.title}</div>${c.desc ? `<div class="ptree-choice-desc">${c.desc}</div>` : ''}</div><div class="ptree-choice-arrow">${c.children ? '›' : '→'}</div></div>`;
              }
              h += '</div>';
            }

            el.innerHTML = h;
          }

          window._treePick = (id, title) => { states[id].path.push({ title }); draw(); };
          window._treeBack = (id, idx) => { states[id].path.splice(idx); draw(); };
          // Return initial HTML placeholder
          setTimeout(draw, 0);
          return `<div id="${containerId}"></div>`;
        }
      },

      chartjs: {
        desc: 'Chart.js interactive charts.',
        scenarios: {
          'Barras': { type: 'bar', data: { labels: ['Q1','Q2','Q3','Q4'], datasets: [{ label: 'Ventas', data: [150,230,180,310], backgroundColor: ['#316dff','#4a8af5','#6ba3f7','#89bff9'] }]}, options: { responsive: true }},
          'Pie': { type: 'pie', data: { labels: ['Frontend','Backend','DevOps'], datasets: [{ data: [35,45,20], backgroundColor: ['#316dff','#4a8af5','#6ba3f7'] }]}, options: { responsive: true }},
          'Línea': { type: 'line', data: { labels: ['Ene','Feb','Mar','Abr','May','Jun'], datasets: [{ label: 'Usuarios', data: [100,120,180,220,310,400], borderColor: '#316dff', tension: 0.3 }]}, options: { responsive: true }},
        },
        render(data, id) {
          setTimeout(() => { try { new Chart(document.getElementById(id).getContext('2d'), data); } catch {} }, 50);
          return `<div style="border-radius:14px;background:white;padding:16px;border:1px solid var(--line);"><canvas id="${id}" style="max-height:250px;"></canvas></div>`;
        }
      },
    };

    // ─── Render gallery ───
    const nav = document.getElementById('nav');
    const gallery = document.getElementById('gallery');
    let counter = 0;

    for (const [name, comp] of Object.entries(COMPONENTS)) {
      // Nav link
      nav.innerHTML += `<a href="#${name}">${name}</a>`;

      // Section
      let html = `<div class="section" id="${name}">`;
      html += `<div class="section-title"><code>\`\`\`${name}</code> ${name.charAt(0).toUpperCase() + name.slice(1)}</div>`;
      html += `<div class="section-desc">${comp.desc}</div>`;
      html += '<div class="scenario-grid">';

      for (const [scenarioName, data] of Object.entries(comp.scenarios)) {
        const id = `comp-${counter++}`;
        html += `<div class="scenario"><div class="scenario-label">${scenarioName}</div><div class="scenario-body" id="${id}"></div></div>`;
        // Defer rendering
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = comp.render(data, id + '-inner');
        }, 10);
      }

      html += '</div></div>';
      gallery.innerHTML += html;
    }

    // Active nav on scroll
    const sections = document.querySelectorAll('.section');
    const navLinks = document.querySelectorAll('.gallery-nav a');
    const observer = new IntersectionObserver(entries => {
      for (const e of entries) {
        if (e.isIntersecting) {
          navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
        }
      }
    }, { threshold: 0.3 });
    sections.forEach(s => observer.observe(s));
  </script>
</body>
</html>
