<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bridge</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      height: 100vh; display: flex; flex-direction: column;
      -webkit-app-region: drag;
      user-select: none;
    }
    .titlebar {
      height: 32px; display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; color: #666; flex-shrink: 0;
    }
    .content {
      flex: 1; display: flex; flex-direction: column;
      -webkit-app-region: no-drag; overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid #222; flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      color: #666; font-size: 0.85rem; font-weight: 500;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: #7c7cf8; border-bottom-color: #7c7cf8; }
    .tab:hover { color: #aaa; }

    /* Panels */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* QR Panel */
    .qr-panel { align-items: center; justify-content: center; gap: 16px; padding: 20px; }
    #qr-container {
      background: white; padding: 16px; border-radius: 12px; display: inline-block;
    }
    #qr-container canvas { display: block; }
    .session-label { font-family: monospace; font-size: 0.8rem; color: #555; }

    /* Status */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; font-size: 0.85rem; flex-shrink: 0;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .dot.waiting { background: #7c7cf8; }
    .dot.connected { background: #4caf50; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 12px; }
    .msg {
      padding: 10px 12px; margin: 4px 0; border-radius: 8px;
      font-size: 0.85rem; line-height: 1.4;
    }
    .msg.incoming { background: #1a1a2e; }
    .msg.outgoing { background: #1a2e1a; }
    .msg.system { background: #1a1a1a; color: #666; font-size: 0.8rem; }
    .msg .meta { font-size: 0.7rem; color: #555; margin-top: 4px; }

    /* Input */
    .input-bar {
      display: flex; gap: 8px; padding: 12px; border-top: 1px solid #222; flex-shrink: 0;
    }
    .input-bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
      background: #111; color: #fff; font-size: 0.9rem; outline: none;
    }
    .input-bar input:focus { border-color: #7c7cf8; }
    .input-bar button {
      padding: 10px 18px; border-radius: 8px; border: none;
      background: #7c7cf8; color: white; font-weight: 600; cursor: pointer;
    }
    .input-bar button:hover { background: #6a6af0; }

    /* Agent Status Panel */
    .agent-status {
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .status-card {
      background: #111; border-radius: 8px; padding: 16px;
      border-left: 3px solid #7c7cf8;
    }
    .status-card h3 { font-size: 0.9rem; color: #7c7cf8; margin-bottom: 4px; }
    .status-card p { font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="titlebar">Bridge v1.0</div>
  <div class="content">
    <div class="tabs">
      <div class="tab active" data-tab="connect">Connect</div>
      <div class="tab" data-tab="chat">Chat</div>
      <div class="tab" data-tab="status">Agent Status</div>
    </div>

    <!-- Connect Tab -->
    <div class="panel qr-panel active" id="panel-connect">
      <div id="qr-container"><canvas id="qr"></canvas></div>
      <div class="session-label" id="session-label">Creating session...</div>
      <div class="status-bar">
        <span class="dot waiting" id="dot"></span>
        <span id="status-text">Waiting for phone...</span>
      </div>
    </div>

    <!-- Chat Tab -->
    <div class="panel" id="panel-chat">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Send a message..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- Agent Status Tab -->
    <div class="panel" id="panel-status">
      <div class="agent-status">
        <div class="status-card">
          <h3>Current Task</h3>
          <p id="agent-task">No active task</p>
        </div>
        <div class="status-card">
          <h3>Status</h3>
          <p id="agent-state">Idle</p>
        </div>
        <div class="status-card">
          <h3>Connected Devices</h3>
          <p id="agent-devices">0 phones connected</p>
        </div>
        <div class="status-card">
          <h3>Messages</h3>
          <p id="agent-msg-count">0 messages exchanged</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://palindrome-exercise.vercel.app';
    let sessionId = null;
    let pairedChatId = null;
    let pairedUsername = null;
    let lastTimestamp = null;
    let msgCount = 0;
    let pollInterval = null;

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    async function init() {
      const res = await fetch(API_BASE + '/api/bridge/sessions', { method: 'POST' });
      const data = await res.json();
      sessionId = data.sessionId;

      document.getElementById('session-label').textContent = 'Session: ' + sessionId.slice(0, 8) + '...';

      const telegramUrl = 'https://t.me/AgenteGauchoBot?start=' + sessionId;
      QRCode.toCanvas(document.getElementById('qr'), telegramUrl,
        { width: 220, margin: 0, color: { dark: '#000', light: '#fff' } }
      );

      // Start Firebase real-time listeners (SSE — instant, no polling)
      startFirebaseStream();
    }

    const FIREBASE_URL = 'https://signaling-dcfad-default-rtdb.europe-west1.firebasedatabase.app';
    const FB_ROOT = 'mercadopago-bridge';

    function startFirebaseStream() {
      // Stream pairing changes
      const pairSSE = new EventSource(
        FIREBASE_URL + '/' + FB_ROOT + '/bridge-pairs/' + sessionId + '.json'
      );
      pairSSE.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data && data.data && data.data.chatId && !pairedChatId) {
          pairedChatId = data.data.chatId;
          pairedUsername = data.data.username;
          document.getElementById('dot').className = 'dot connected';
          document.getElementById('status-text').textContent = (pairedUsername || 'Phone') + ' connected via Telegram';
          document.getElementById('agent-devices').textContent = '1 phone connected (' + (pairedUsername || 'unknown') + ')';
          addMsgEl('system', '📱 ' + (pairedUsername || 'Phone') + ' connected via Telegram');
          document.querySelector('[data-tab="chat"]').click();
          // Now stream messages
          startMessageStream();
        }
      };
      pairSSE.onerror = () => {
        // Fallback to polling if SSE fails
        setTimeout(() => pollForPairing(), 2000);
      };

      // Also poll as fallback (Firebase REST SSE can be flaky)
      pollForPairing();
    }

    function pollForPairing() {
      if (pairedChatId) return;
      pollInterval = setInterval(async () => {
        if (pairedChatId) { clearInterval(pollInterval); return; }
        try {
          const res = await fetch(API_BASE + '/api/bridge/pair?session=' + sessionId);
          const data = await res.json();
          if (data.paired) {
            pairedChatId = data.chatId;
            pairedUsername = data.username;
            document.getElementById('dot').className = 'dot connected';
            document.getElementById('status-text').textContent = (data.username || 'Phone') + ' connected via Telegram';
            document.getElementById('agent-devices').textContent = '1 phone connected (' + (data.username || 'unknown') + ')';
            addMsgEl('system', '📱 ' + (data.username || 'Phone') + ' connected via Telegram');
            document.querySelector('[data-tab="chat"]').click();
            clearInterval(pollInterval);
            startMessageStream();
          }
        } catch (e) {}
      }, 1500);
    }

    const seenMsgKeys = new Set();

    function startMessageStream() {
      // Stream new messages from Firebase in real-time
      const msgSSE = new EventSource(
        FIREBASE_URL + '/' + FB_ROOT + '/bridge-messages/' + sessionId + '.json'
      );
      msgSSE.addEventListener('put', (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (!payload || !payload.data) return;

          // Could be a single message or all messages
          if (payload.path === '/') {
            // Initial load — all messages
            const msgs = payload.data;
            if (msgs && typeof msgs === 'object') {
              Object.entries(msgs).forEach(([key, msg]) => {
                if (!seenMsgKeys.has(key) && msg.from !== 'agent') {
                  seenMsgKeys.add(key);
                  // Skip if this is old
                }
              });
            }
          } else {
            // New individual message
            const key = payload.path.replace('/', '');
            const msg = payload.data;
            if (msg && !seenMsgKeys.has(key)) {
              seenMsgKeys.add(key);
              msgCount++;
              const label = msg.from === 'agent' ? '🤖 agent' : ('📱 ' + (msg.from || 'phone'));
              addMsgEl(msg.from === 'agent' ? 'system' : 'incoming',
                msg.content,
                label + ' · ' + (msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '')
              );
              document.getElementById('agent-msg-count').textContent = msgCount + ' messages exchanged';
            }
          }
        } catch (e) {}
      });
      msgSSE.onerror = () => {
        // Fallback to polling
        startMessagePolling();
      };

      // Also stream agent status
      const statusSSE = new EventSource(
        FIREBASE_URL + '/' + FB_ROOT + '/bridge-status/' + sessionId + '.json'
      );
      statusSSE.addEventListener('put', (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload && payload.data) {
            const s = payload.data;
            document.getElementById('agent-task').textContent = s.task || 'No active task';
            document.getElementById('agent-state').textContent = s.state || 'Idle';
          }
        } catch (e) {}
      });
    }

    function startMessagePolling() {
      setInterval(async () => {
        try {
          const url = API_BASE + '/api/bridge/messages?session=' + sessionId +
            (lastTimestamp ? '&since=' + encodeURIComponent(lastTimestamp) : '');
          const res = await fetch(url);
          const data = await res.json();
          if (data.messages && data.messages.length > 0) {
            for (const msg of data.messages) {
              msgCount++;
              addMsgEl('incoming', msg.content, (msg.from || 'phone') + ' · ' + new Date(msg.timestamp).toLocaleTimeString());
              lastTimestamp = msg.timestamp;
            }
            document.getElementById('agent-msg-count').textContent = msgCount + ' messages exchanged';
          }
        } catch (e) {}
      }, 1500);
    }

    function addMessage(msg) {
      if (msg.type === 'peer_joined' || msg.type === 'peer_left') {
        addMsgEl('system', msg.type === 'peer_joined' ? '📱 Phone connected' : '📱 Phone disconnected');
        return;
      }
      msgCount++;
      document.getElementById('agent-msg-count').textContent = msgCount + ' messages exchanged';

      const isFromMe = msg.from === 'desktop';
      addMsgEl(isFromMe ? 'outgoing' : 'incoming',
        msg.content || msg.type,
        (msg.from || 'system') + ' · ' + (msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '')
      );
    }

    function addMsgEl(type, text, meta) {
      const div = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'msg ' + type;
      el.textContent = text;
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        el.appendChild(m);
      }
      div.appendChild(el);
      div.scrollTop = div.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const content = input.value.trim();
      if (!content || !pairedChatId) return;

      // Send to Telegram via our API
      await fetch(API_BASE + '/api/bridge/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatId: pairedChatId, content: content }),
      });

      addMsgEl('outgoing', content, 'desktop · ' + new Date().toLocaleTimeString());
      msgCount++;
      document.getElementById('agent-msg-count').textContent = msgCount + ' messages exchanged';
      input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    init();
  </script>
</body>
</html>
