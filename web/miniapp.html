<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bridge Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>/* components.js is inlined below — edit web/components.js and rebuild */</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #bcecff;
      --mist: #dff7f2;
      --cream: #f7f6ef;
      --shell: rgba(255,255,255,0.72);
      --ink: var(--tg-theme-text-color, #112033);
      --slate: var(--tg-theme-hint-color, #56708a);
      --ocean: var(--tg-theme-link-color, #316dff);
      --mint: #89e0c8;
      --coral: #ff9f6e;
      --line: var(--tg-theme-secondary-bg-color, rgba(17,32,51,0.08));
      --bg: var(--tg-theme-bg-color, #f7f6ef);
      --bg-secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,0.5));
      --btn-color: var(--tg-theme-button-color, #316dff);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }
    .status-dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    .status-label {
      font-size: 13px; font-weight: 600; color: var(--slate);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .status-label .task { color: var(--ink); font-weight: 700; }

    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex;
      flex-direction: column; gap: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(86,112,138,0.2); border-radius: 2px; }

    .msg { animation: fadeIn 0.2s ease-out; max-width: 100%; }
    .msg-from {
      font-size: 11px; font-weight: 700; color: var(--ocean);
      margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .msg-from.user-msg { color: var(--slate); text-align: right; }
    .msg-bubble {
      font-size: 14px; line-height: 1.6; padding: 10px 14px;
      border-radius: 14px; background: var(--bg-secondary);
      border: 1px solid var(--line); word-break: break-word;
    }
    .msg-bubble.from-user {
      background: var(--btn-color); color: var(--btn-text);
      border: none; margin-left: auto; max-width: 85%;
      border-radius: 14px 14px 4px 14px;
    }
    .msg-bubble.from-agent { border-radius: 14px 14px 14px 4px; }
    .msg-time {
      font-size: 10px; color: var(--slate); opacity: 0.5;
      margin-top: 2px;
    }
    .msg-row-user { display: flex; flex-direction: column; align-items: flex-end; }
    .msg-row-other { display: flex; flex-direction: column; align-items: flex-start; }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--slate); font-size: 14px; opacity: 0.5; text-align: center;
      padding: 40px;
    }

    /* Composer */
    .composer {
      padding: 10px 12px; border-top: 1px solid var(--line);
      background: var(--bg); display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    }
    .composer textarea {
      flex: 1; border: 1px solid var(--line); background: var(--bg-secondary);
      border-radius: 12px; padding: 10px 14px; font-size: 15px;
      font-family: inherit; color: var(--ink); resize: none;
      min-height: 40px; max-height: 120px; outline: none;
    }
    .composer textarea::placeholder { color: var(--slate); opacity: 0.5; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--btn-color); color: var(--btn-text);
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Rich component CSS is injected by components.js */
    .rc-tree-question { font-size: 16px; font-weight: 800; text-align: center; margin: 10px 0; }
    .rc-tree-choices { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .rc-tree-choice { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--line); background: var(--bg-secondary); cursor: pointer; transition: all 0.15s; }
    .rc-tree-choice:active { transform: scale(0.98); }
    .rc-tree-choice-body { flex: 1; }
    .rc-tree-choice-title { font-size: 14px; font-weight: 700; }
    .rc-tree-choice-desc { font-size: 12px; color: var(--slate); line-height: 1.4; margin-top: 2px; }
    .rc-tree-choice-arrow { color: var(--slate); opacity: 0.4; font-size: 16px; }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-label" id="statusLabel">Connecting...</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">No messages yet</div>
  </div>

  <!-- Composer -->
  <div class="composer">
    <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <script>
    // Telegram WebApp init
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    var API_BASE = 'https://palindrome-exercise.vercel.app';
    var FIREBASE_URL = 'https://signaling-dcfad-default-rtdb.europe-west1.firebasedatabase.app';
    var sessionId = new URLSearchParams(window.location.search).get('session') || '';

    var messagesEl = document.getElementById('messages');
    var emptyState = document.getElementById('emptyState');
    var inputEl = document.getElementById('input');
    var sendBtn = document.getElementById('sendBtn');
    var statusDot = document.getElementById('statusDot');
    var statusLabel = document.getElementById('statusLabel');

    var renderedKeys = {};
    // Component types are now managed by components.js

    if (!sessionId) {
      statusLabel.textContent = 'No session ID provided';
      emptyState.textContent = 'Open this page with ?session=SESSION_ID';
    } else {
      init();
    }

    function init() {
      statusLabel.textContent = 'Session: ' + sessionId.slice(0, 8) + '...';
      listenMessages();
      listenStatus();
    }

    // SSE for messages
    function listenMessages() {
      var url = FIREBASE_URL + '/mercadopago-bridge/bridge-messages/' + sessionId + '.json';
      // Initial load
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        if (data) {
          var keys = Object.keys(data).sort();
          for (var i = 0; i < keys.length; i++) {
            addMessage(keys[i], data[keys[i]]);
          }
          scrollBottom();
        }
      });
      // SSE stream
      var es = new EventSource(url + '?orderBy="$key"&limitToLast=1');
      es.addEventListener('put', function(e) {
        try {
          var payload = JSON.parse(e.data);
          if (!payload.data) return;
          if (payload.path === '/') {
            var keys = Object.keys(payload.data);
            for (var i = 0; i < keys.length; i++) {
              addMessage(keys[i], payload.data[keys[i]]);
            }
          } else {
            var key = payload.path.replace('/', '');
            addMessage(key, payload.data);
          }
          scrollBottom();
        } catch (err) { console.error('SSE parse error', err); }
      });
      es.onerror = function() {
        setTimeout(function() { listenMessages(); }, 5000);
        es.close();
      };
    }

    // SSE for agent status
    function listenStatus() {
      var url = FIREBASE_URL + '/mercadopago-bridge/bridge-status/' + sessionId + '.json';
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        updateStatus(data);
      });
      var es = new EventSource(url);
      es.addEventListener('put', function(e) {
        try {
          var payload = JSON.parse(e.data);
          updateStatus(payload.data);
        } catch (err) {}
      });
    }

    function updateStatus(data) {
      if (!data) {
        statusDot.className = 'status-dot';
        statusLabel.innerHTML = 'Agent idle';
        return;
      }
      var isActive = data.status === 'working' || data.status === 'running';
      statusDot.className = 'status-dot' + (isActive ? ' active' : '');
      var label = isActive ? 'Working' : 'Idle';
      var task = data.task || data.message || '';
      statusLabel.innerHTML = label + (task ? ': <span class="task">' + esc(task) + '</span>' : '');
    }

    function addMessage(key, msg) {
      if (renderedKeys[key]) return;
      renderedKeys[key] = true;
      emptyState.style.display = 'none';

      var div = document.createElement('div');
      div.className = 'msg';

      var from = msg.from || 'system';
      var isUser = from !== 'agent' && from !== 'system' && from !== 'bot';
      var isAgent = from === 'agent' || from === 'bot';

      div.innerHTML =
        '<div class="' + (isUser ? 'msg-row-user' : 'msg-row-other') + '">' +
          '<div class="msg-from ' + (isUser ? 'user-msg' : '') + '">' + esc(from) + '</div>' +
          '<div class="msg-bubble ' + (isUser ? 'from-user' : 'from-agent') + '">' + md(msg.content || '') + '</div>' +
          (msg.timestamp ? '<div class="msg-time">' + formatTime(msg.timestamp) + '</div>' : '') +
        '</div>';

      messagesEl.appendChild(div);
    }

    function scrollBottom() {
      setTimeout(function() { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
    }

    function formatTime(ts) {
      try {
        var d = new Date(ts);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (e) { return ''; }
    }

    // Send message
    inputEl.addEventListener('input', function() {
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function sendMessage() {
      var text = inputEl.value.trim();
      if (!text || !sessionId) return;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      var username = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user)
        ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'User')
        : 'User';

      fetch(API_BASE + '/api/bridge/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sessionId, from: username, content: text }),
      }).catch(function(err) { console.error('Send error', err); });
    }

    // selectOption is handled by BridgeComponents.onSelect via setOnSelect above

    // Escape HTML
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Use shared component library (components.js)
    BridgeComponents.injectCSS();
    BridgeComponents.loadDynamic(FIREBASE_URL);
    BridgeComponents.setOnSelect(function(title) {
      if (sessionId) {
        var username = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user)
          ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'User')
          : 'User';
        fetch(API_BASE + '/api/bridge/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sessionId, from: username, content: title }),
        });
      }
    });

    function md(text) {
      return BridgeComponents.md(text);
      } catch (e) { return esc(text); }
    }
  </script>
</body>
</html>
