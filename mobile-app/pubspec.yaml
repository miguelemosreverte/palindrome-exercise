name: bridge_mobile
description: Mobile companion for MercadoPago-to-ChutesAI bridge. Scan QR to connect.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR code scanning
  mobile_scanner: ^6.0.0

  # WebSocket for real-time communication with Vercel gateway
  web_socket_channel: ^3.0.0

  # Local storage for session persistence
  shared_preferences: ^2.2.0

  # HTTP requests
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
