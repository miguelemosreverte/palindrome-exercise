<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Acceso a Modelos</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32'%3E%3Cstop offset='0%25' stop-color='%23316dff'/%3E%3Cstop offset='100%25' stop-color='%2389e0c8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M8 21V11l4 4 4-4 4 4 4-4v10' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { overflow: hidden; height: 100dvh; display: flex; margin: 0; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(86,112,138,0.2); border-radius: 3px; }
    .msg-fade { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .chat-sidebar { width: 280px; background: rgba(255,255,255,0.55); backdrop-filter: blur(16px); border-right: 1px solid rgba(255,255,255,0.75); display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: transparent; }
    .chat-header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); flex-shrink: 0; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 40px 20px 140px; display: flex; flex-direction: column; gap: 28px; }
    .msg-row { max-width: 780px; width: 100%; margin: 0 auto; }
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user-bubble { background: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.8); box-shadow: var(--shadow-soft); border-radius: 24px 24px 6px 24px; padding: 14px 20px; max-width: 85%; font-size: 15px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg-assistant-row { display: flex; gap: 14px; align-items: flex-start; }
    .msg-model-badge { width: 30px; height: 30px; border-radius: 10px; background: linear-gradient(135deg, var(--ocean), var(--mint)); flex-shrink: 0; }
    .msg-assistant-text { font-size: 15px; line-height: 1.65; word-break: break-word; padding-top: 4px; min-width: 0; }
    .composer-wrap { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px 20px; background: linear-gradient(to top, rgba(247,246,239,0.95) 60%, transparent); z-index: 5; display: flex; justify-content: center; }
    .composer { width: 100%; max-width: 780px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.75); background: rgba(255,255,255,0.7); box-shadow: var(--shadow-soft); backdrop-filter: blur(10px); padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; }
    .composer-model-row { display: flex; align-items: center; gap: 8px; padding: 4px 4px 2px; }
    .composer-model-row svg { width: 14px; height: 14px; color: var(--slate); opacity: 0.5; }
    .composer-model-row select { background: transparent; border: none; padding: 4px 0; font-size: 12px; font-weight: 700; color: var(--ink); cursor: pointer; outline: none; border-radius: 0; width: auto; flex: 1; }
    .composer-input-row { display: flex; align-items: flex-end; gap: 8px; }
    .composer-input-row textarea { flex: 1; border: none; background: transparent; padding: 8px 4px; min-height: 40px; max-height: 200px; resize: none; font-size: 15px; outline: none; color: var(--ink); border-radius: 0; }
    .send-btn { width: 34px; height: 34px; border-radius: 12px; background: var(--ocean); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { background: rgba(86,112,138,0.2); cursor: not-allowed; }
    .composer-hint { padding: 2px 4px; font-size: 10px; color: var(--slate); opacity: 0.4; font-weight: 600; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); z-index: 40; }
    .sidebar-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 14px; color: var(--slate); font-size: 13px; font-weight: 600; transition: all 0.15s; text-decoration: none; border: none; background: none; cursor: pointer; width: 100%; text-align: left; }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.6); color: var(--ink); }
    .sidebar-nav-item svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }
    .sidebar-history-item { width: 100%; text-align: left; padding: 10px 14px; border-radius: 14px; border: none; background: transparent; cursor: pointer; font: inherit; color: var(--slate); transition: all 0.15s; }
    .sidebar-history-item:hover { background: rgba(255,255,255,0.6); color: var(--ink); }
    .sidebar-history-item.active { background: rgba(255,255,255,0.8); box-shadow: 0 2px 8px rgba(0,0,0,0.04); color: var(--ink); }
    .sidebar-history-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-history-date { font-size: 10px; opacity: 0.5; margin-top: 2px; }
    /* Tool output blocks */
    .tool-block { margin: 8px 0; border-radius: 12px; border: 1px solid var(--line); overflow: hidden; }
    .tool-header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(0,0,0,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate); cursor: pointer; }
    .tool-header svg { width: 14px; height: 14px; }
    .tool-header .tool-status { margin-left: auto; font-size: 10px; text-transform: none; letter-spacing: 0; }
    .tool-header .tool-status.ok { color: #16a34a; }
    .tool-header .tool-status.err { color: #ef4444; }
    .tool-body { padding: 10px 14px; font-size: 13px; line-height: 1.5; }
    .tool-body pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .tool-body.terminal { background: #1e293b; color: #e2e8f0; font-family: monospace; }
    .tool-body.terminal .cmd { color: #86efac; margin-bottom: 6px; }
    @media (max-width: 768px) {
      .chat-sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .chat-sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
    }
  </style>
</head>
<body class="fade-in">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="chat-sidebar" id="sidebar">
    <div style="padding: 20px 16px; border-bottom: 1px solid var(--line);">
      <a href="/" style="font-size: 18px; font-weight: 800; color: var(--ink);">Modelos IA</a>
      <button id="newChatBtn" style="margin-top: 14px; width: 100%; display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 14px; background: var(--ocean); color: white; border: none; font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;">
        <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Nuevo chat
      </button>
    </div>

    <div style="flex: 1; overflow-y: auto; padding: 14px 10px;" class="chat-scroll">
      <div style="padding: 0 14px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--slate); opacity: 0.5; font-weight: 700;">Sesiones</div>
      <div id="historyList" style="display: flex; flex-direction: column; gap: 2px;"></div>
    </div>

    <div style="padding: 10px; border-top: 1px solid var(--line);">
      <button onclick="location.href='/'" class="sidebar-nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Inicio
      </button>
    </div>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="toggleSidebar" style="padding: 6px; border-radius: 8px; border: none; background: none; cursor: pointer; color: var(--slate);">
          <svg style="width:20px;height:20px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span id="chatTitle" style="font-size: 14px; font-weight: 800;">Nuevo chat</span>
      </div>
      <div style="display: flex; align-items: center; gap: 14px;">
        <span id="statusInfo" style="font-size: 11px; font-weight: 600; color: var(--slate); opacity: 0.6;"></span>
      </div>
    </header>

    <div class="chat-messages chat-scroll" id="messages">
      <div class="msg-row" style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; opacity: 0.35;">
          <div style="font-size: 32px; font-weight: 800;">Empezá un chat</div>
          <p style="margin-top: 8px; font-size: 14px; color: var(--slate);">Elegí un modelo y escribí un mensaje.</p>
        </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div id="chatStatus" style="max-width: 780px; width: 100%; margin: 0 auto 8px;"></div>
      <div class="composer">
        <div class="composer-model-row">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.6-6.4l-1.4 1.4M6 6L4.6 4.6m0 14.8L6 18m12 0l1.4 1.4"/></svg>
          <select id="modelSelect">
            <option>Cargando modelos...</option>
          </select>
        </div>
        <div class="composer-input-row">
          <textarea id="promptInput" placeholder="Escribí un mensaje..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="Enviar">
            <svg id="sendIcon" style="width:16px;height:16px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <svg id="stopIcon" style="width:16px;height:16px;display:none;" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div class="composer-hint">Enter para enviar · Shift+Enter nueva línea</div>
      </div>
    </div>
  </main>

  <script>
    // ─── OpenCode Backend ───
    const OPENCODE = 'https://opencode-production-42c2.up.railway.app';

    const messagesNode = document.getElementById('messages');
    const historyList = document.getElementById('historyList');
    const chatTitle = document.getElementById('chatTitle');
    const statusInfo = document.getElementById('statusInfo');
    const chatStatus = document.getElementById('chatStatus');
    const modelSelect = document.getElementById('modelSelect');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    let currentSessionId = null;
    let sending = false;
    let chartCounter = 0;

    // ─── Sidebar ───
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
    document.getElementById('toggleSidebar').addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
    sidebarOverlay.addEventListener('click', closeSidebar);

    // ─── Input ───
    promptInput.addEventListener('input', () => { promptInput.style.height = 'auto'; promptInput.style.height = promptInput.scrollHeight + 'px'; });
    promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    // ─── Helpers ───
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function scrollToBottom() { messagesNode.scrollTop = messagesNode.scrollHeight; }

    // ─── Markdown + Chart rendering ───
    function formatText(text) {
      try {
        let html = escapeHtml(text);
        // Code blocks
        const parts = html.split('```');
        if (parts.length >= 3) {
          html = '';
          for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 0) html += parts[i];
            else { const code = parts[i].replace(/^\w*\n/, ''); html += `<pre style="margin:8px 0;padding:14px;border-radius:12px;background:#1e293b;color:#e2e8f0;font-size:13px;line-height:1.5;overflow-x:auto;"><code>${code}</code></pre>`; }
          }
        }
        html = html.replace(/`([^`\n]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-size:13px;">$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^### (.+)$/gm, '<div style="font-size:15px;font-weight:800;margin:12px 0 4px;">$1</div>');
        html = html.replace(/^## (.+)$/gm, '<div style="font-size:17px;font-weight:800;margin:14px 0 6px;">$1</div>');
        html = html.replace(/^# (.+)$/gm, '<div style="font-size:20px;font-weight:800;margin:16px 0 8px;">$1</div>');
        html = html.replace(/^[*\-] (.+)$/gm, '<div style="padding-left:16px;">• $1</div>');
        html = html.replace(/^(\d+)\. (.+)$/gm, '<div style="padding-left:16px;">$1. $2</div>');
        html = html.replace(/\n/g, '<br>');
        return html;
      } catch { return escapeHtml(text); }
    }

    // ─── Render tool part ───
    function renderToolPart(part) {
      const tool = part.tool || '?';
      const state = part.state || {};
      const input = state.input || {};
      const status = state.status;
      const isOk = status === 'completed';
      const isErr = status === 'error';

      let headerIcon = '⚡';
      if (tool === 'bash') headerIcon = '▶';
      else if (tool === 'write') headerIcon = '📝';
      else if (tool === 'read') headerIcon = '📄';
      else if (tool === 'edit') headerIcon = '✏️';
      else if (tool === 'websearch' || tool === 'webfetch') headerIcon = '🔍';
      else if (tool === 'grep' || tool === 'glob') headerIcon = '🔎';

      const statusLabel = isOk ? '<span class="tool-status ok">✓ ok</span>' : isErr ? `<span class="tool-status err">✗ error</span>` : '<span class="tool-status">...</span>';

      let bodyHtml = '';
      if (tool === 'bash') {
        const cmd = input.command || input.description || '';
        const output = state.output || state.error || '';
        bodyHtml = `<div class="tool-body terminal"><div class="cmd">$ ${escapeHtml(cmd)}</div><pre>${escapeHtml(output)}</pre></div>`;
      } else if (tool === 'write') {
        bodyHtml = `<div class="tool-body"><pre>${escapeHtml(input.filePath || '')} — ${isOk ? 'archivo creado' : state.error || ''}</pre></div>`;
      } else if (tool === 'read') {
        const content = state.output || '';
        bodyHtml = `<div class="tool-body terminal"><pre>${escapeHtml(content).slice(0, 2000)}</pre></div>`;
      } else if (tool === 'edit') {
        bodyHtml = `<div class="tool-body"><pre>${escapeHtml(input.filePath || '')} — editado</pre></div>`;
      } else if (tool === 'websearch' || tool === 'webfetch') {
        const query = typeof input === 'string' ? input : (input.query || input.url || JSON.stringify(input));
        const output = state.output || '';
        bodyHtml = `<div class="tool-body"><div style="color:var(--ocean);font-weight:600;margin-bottom:6px;">${escapeHtml(query)}</div><pre style="font-size:12px;color:var(--slate);">${escapeHtml(output).slice(0, 1500)}</pre></div>`;
      } else {
        const output = state.output || state.error || '';
        bodyHtml = `<div class="tool-body"><pre>${escapeHtml(JSON.stringify(input)).slice(0, 300)}</pre>${output ? `<pre style="margin-top:6px;">${escapeHtml(output).slice(0, 1000)}</pre>` : ''}</div>`;
      }

      return `<details class="tool-block" ${isErr ? 'open' : ''}><summary class="tool-header">${headerIcon} ${tool} ${statusLabel}</summary>${bodyHtml}</details>`;
    }

    // ─── Render message parts from OpenCode ───
    function renderAssistantParts(parts) {
      let html = '';
      for (const p of parts) {
        if (p.type === 'text' && p.text) {
          html += `<div class="msg-assistant-text">${formatText(p.text)}</div>`;
        } else if (p.type === 'tool') {
          html += renderToolPart(p);
        } else if (p.type === 'reasoning' && p.text) {
          html += `<details style="margin:8px 0;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,0.4);"><summary style="cursor:pointer;padding:8px 14px;font-size:12px;font-weight:700;color:var(--slate);">Razonamiento</summary><div style="padding:8px 14px 12px;font-size:13px;line-height:1.6;color:var(--slate);white-space:pre-wrap;">${escapeHtml(p.text)}</div></details>`;
        }
        // step-start, step-finish: skip
      }
      return html;
    }

    // ─── Append message to UI ───
    function appendUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-row msg-fade';
      row.innerHTML = `<div class="msg-user"><div class="msg-user-bubble">${escapeHtml(text)}</div></div>`;
      messagesNode.appendChild(row);
      scrollToBottom();
    }

    function appendAssistantMessage(parts) {
      const row = document.createElement('div');
      row.className = 'msg-row msg-fade';
      const content = renderAssistantParts(parts);
      row.innerHTML = `<div class="msg-assistant-row"><div class="msg-model-badge"></div><div style="min-width:0;flex:1;">${content}</div></div>`;
      messagesNode.appendChild(row);
      scrollToBottom();

      // Render any Chart.js blocks found in text
      row.querySelectorAll('.msg-assistant-text').forEach(el => {
        const text = el.textContent || '';
        // Check for chart JSON in the raw text parts
      });
    }

    function showEmptyState() {
      messagesNode.innerHTML = `<div class="msg-row" style="flex:1;display:flex;align-items:center;justify-content:center;"><div style="text-align:center;opacity:0.35;"><div style="font-size:32px;font-weight:800;">Empezá un chat</div><p style="margin-top:8px;font-size:14px;color:var(--slate);">Elegí un modelo y escribí un mensaje.</p></div></div>`;
    }

    // ─── Load sessions from OpenCode ───
    async function loadSessions() {
      try {
        const sessions = await fetch(OPENCODE + '/session').then(r => r.json());
        historyList.innerHTML = sessions.map(s => `
          <button type="button" class="sidebar-history-item ${s.id === currentSessionId ? 'active' : ''}" data-sid="${s.id}">
            <div class="sidebar-history-title">${escapeHtml(s.title || s.slug || 'Nuevo chat')}</div>
            <div class="sidebar-history-date">${new Date(s.createdAt || Date.now()).toLocaleDateString()}</div>
          </button>
        `).join('');

        historyList.querySelectorAll('[data-sid]').forEach(el => {
          el.addEventListener('click', () => { loadSession(el.dataset.sid); closeSidebar(); });
        });
      } catch (e) {
        historyList.innerHTML = `<div style="padding:10px;font-size:12px;color:var(--slate);">Error: ${e.message}</div>`;
      }
    }

    // ─── Load a session's messages ───
    async function loadSession(sessionId) {
      currentSessionId = sessionId;
      statusInfo.textContent = 'Cargando...';
      messagesNode.innerHTML = '';

      try {
        const msgs = await fetch(OPENCODE + '/session/' + sessionId + '/message').then(r => r.json());
        const sessionInfo = await fetch(OPENCODE + '/session/' + sessionId).then(r => r.json());
        chatTitle.textContent = sessionInfo.title || sessionInfo.slug || 'Chat';

        if (!msgs.length) { showEmptyState(); return; }

        for (const msg of msgs) {
          const parts = msg.parts || [];
          const role = msg.role;

          if (role === 'user') {
            const textPart = parts.find(p => p.type === 'text');
            if (textPart) appendUserMessage(textPart.text);
          } else {
            appendAssistantMessage(parts);
          }
        }
        scrollToBottom();
        loadSessions(); // refresh sidebar active state
      } catch (e) {
        chatStatus.innerHTML = `<div class="status show error">${e.message}</div>`;
      } finally {
        statusInfo.textContent = '';
      }
    }

    // ─── Load models from OpenCode providers ───
    async function loadModels() {
      try {
        const data = await fetch(OPENCODE + '/provider').then(r => r.json());
        const models = [];
        for (const p of (data.all || [])) {
          for (const [mid, m] of Object.entries(p.models || {})) {
            if (m.id) models.push({ provider: p.id, model: m.id, name: m.name || m.id });
          }
        }
        modelSelect.innerHTML = models.map(m =>
          `<option value="${m.provider}::${m.model}">${m.name}</option>`
        ).join('');
      } catch {
        modelSelect.innerHTML = '<option value="">Error al cargar modelos</option>';
      }
    }

    // ─── Send message ───
    async function sendMessage() {
      const text = promptInput.value.trim();
      if (!text || sending) return;
      sending = true;
      sendBtn.disabled = true;
      document.getElementById('sendIcon').style.display = 'none';
      document.getElementById('stopIcon').style.display = 'block';
      sendBtn.style.background = '#ef4444';

      // Create session if needed
      if (!currentSessionId) {
        try {
          const session = await fetch(OPENCODE + '/session', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
          }).then(r => r.json());
          currentSessionId = session.id;
          chatTitle.textContent = session.slug || 'Nuevo chat';
          messagesNode.innerHTML = '';
        } catch (e) {
          chatStatus.innerHTML = `<div class="status show error">No se pudo crear sesión: ${e.message}</div>`;
          resetSendUI();
          return;
        }
      }

      appendUserMessage(text);
      promptInput.value = '';
      promptInput.style.height = 'auto';

      // Show thinking indicator
      const thinkingRow = document.createElement('div');
      thinkingRow.className = 'msg-row msg-fade';
      thinkingRow.innerHTML = `<div class="msg-assistant-row"><div class="msg-model-badge"></div><div style="font-size:13px;color:var(--slate);padding-top:8px;">Pensando...</div></div>`;
      messagesNode.appendChild(thinkingRow);
      scrollToBottom();

      try {
        // Parse selected model
        const modelVal = modelSelect.value;
        const [providerID, modelID] = modelVal.includes('::') ? modelVal.split('::') : [undefined, undefined];

        const body = {
          parts: [{ type: 'text', text }],
        };
        if (providerID && modelID) {
          body.model = { providerID, modelID };
        }

        statusInfo.textContent = 'Procesando...';

        const res = await fetch(OPENCODE + '/session/' + currentSessionId + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        // Remove thinking indicator
        thinkingRow.remove();

        if (data.parts) {
          appendAssistantMessage(data.parts);
        } else if (data.info?.parts) {
          appendAssistantMessage(data.info.parts);
        } else if (data.error) {
          chatStatus.innerHTML = `<div class="status show error">${Array.isArray(data.error) ? data.error.map(e => e.message).join(', ') : data.error}</div>`;
        }

        // Refresh sessions
        loadSessions();
      } catch (e) {
        thinkingRow.remove();
        chatStatus.innerHTML = `<div class="status show error">${e.message}</div>`;
      } finally {
        resetSendUI();
        statusInfo.textContent = '';
      }
    }

    function resetSendUI() {
      sending = false;
      sendBtn.disabled = false;
      document.getElementById('sendIcon').style.display = 'block';
      document.getElementById('stopIcon').style.display = 'none';
      sendBtn.style.background = 'var(--ocean)';
    }

    sendBtn.addEventListener('click', sendMessage);

    document.getElementById('newChatBtn').addEventListener('click', () => {
      currentSessionId = null;
      chatTitle.textContent = 'Nuevo chat';
      showEmptyState();
      loadSessions();
      closeSidebar();
    });

    // ─── Init ───
    loadModels();
    loadSessions();
  </script>
</body>
</html>
