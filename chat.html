<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Acceso a Modelos</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32'%3E%3Cstop offset='0%25' stop-color='%23316dff'/%3E%3Cstop offset='100%25' stop-color='%2389e0c8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M8 21V11l4 4 4-4 4 4 4-4v10' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: "#bcecff",
            mist: "#dff7f2",
            cream: "#f7f6ef",
            ink: "#112033",
            slate: "#56708a",
            ocean: "#316dff",
            mint: "#89e0c8",
          },
          fontFamily: {
            sans: ["Instrument Sans", "system-ui", "sans-serif"]
          },
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Instrument Sans", system-ui, sans-serif;
      overflow: hidden;
      height: 100dvh;
    }

    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .msg-assistant { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    textarea { field-sizing: content; }
  </style>
</head>
<body class="bg-white text-ink flex h-[100dvh]">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-72 bg-cream/60 border-r border-slate/10 flex flex-col transition-all duration-300 shrink-0 max-md:fixed max-md:inset-y-0 max-md:left-0 max-md:z-50 max-md:-translate-x-full" data-open="false">
    <div class="p-5 border-b border-slate/10">
      <div class="flex items-center justify-between">
        <a href="/" class="text-lg font-extrabold tracking-tight text-ink">Modelos IA</a>
        <button id="closeSidebar" class="md:hidden p-1.5 rounded-lg hover:bg-white/60 text-slate">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <button id="newChatBtn" class="mt-4 w-full flex items-center gap-2.5 px-4 py-2.5 rounded-xl bg-ocean text-white text-sm font-semibold shadow-sm hover:bg-ocean/90 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Nuevo chat
      </button>
    </div>

    <nav class="p-3 flex flex-col gap-0.5">
      <a href="/" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-slate hover:bg-white/60 hover:text-ink transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Inicio
      </a>
      <a href="/dashboard.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-slate hover:bg-white/60 hover:text-ink transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi panel
      </a>
    </nav>

    <div class="flex-1 overflow-y-auto px-3 pb-3 chat-scroll">
      <p class="px-3 mb-2 text-[0.65rem] font-semibold uppercase tracking-[0.2em] text-slate/60">Historial</p>
      <div id="historyList" class="flex flex-col gap-0.5"></div>
      <div id="sidebarStatus"></div>
    </div>

    <div class="p-3 border-t border-slate/10">
      <button data-logout class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-red-500 hover:bg-red-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden"></div>

  <!-- Main chat -->
  <main class="flex-1 flex flex-col min-w-0 relative">
    <!-- Header -->
    <header class="h-14 px-4 flex items-center justify-between border-b border-slate/10 bg-white shrink-0">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar" class="p-1.5 -ml-1 rounded-lg hover:bg-slate/5 text-slate">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 id="chatTitle" class="text-sm font-bold truncate">Nuevo chat</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="quotaInfo" class="text-xs font-semibold text-ocean"></span>
        <span id="connectionState" class="text-[10px] font-medium text-slate/50"></span>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto chat-scroll px-4 py-8 flex flex-col gap-6">
      <div class="flex-1 flex items-center justify-center">
        <div class="text-center opacity-40">
          <p class="text-3xl font-extrabold tracking-tight">Hablar con IA</p>
          <p class="mt-2 text-sm text-slate">Elegí un modelo abajo y empezá a chatear.</p>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div class="px-4 pb-4 pt-2 bg-gradient-to-t from-white via-white to-transparent">
      <div id="chatStatus" class="mb-2"></div>
      <div class="max-w-3xl mx-auto">
        <div class="rounded-2xl border border-slate/15 bg-cream/30 shadow-sm focus-within:border-ocean/30 focus-within:ring-2 focus-within:ring-ocean/10 transition">
          <!-- Model selector row -->
          <div class="px-3 pt-2.5 flex items-center gap-2">
            <svg class="w-4 h-4 text-slate/50 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.6-6.4l-1.4 1.4M6 6L4.6 4.6m0 14.8L6 18m12 0l1.4 1.4"/></svg>
            <select id="modelSelect" class="flex-1 bg-transparent text-xs font-semibold text-ink py-1.5 outline-none cursor-pointer appearance-none">
              <option>Cargando modelos...</option>
            </select>
          </div>
          <!-- Input row -->
          <div class="flex items-end gap-2 px-3 pb-2.5 pt-1">
            <textarea id="promptInput" placeholder="Escribí un mensaje..." rows="1" class="flex-1 bg-transparent text-[15px] text-ink placeholder:text-slate/35 outline-none resize-none min-h-[40px] max-h-[200px] py-1.5 leading-relaxed"></textarea>
            <button id="sendBtn" class="w-8 h-8 rounded-full bg-ocean text-white flex items-center justify-center shrink-0 hover:bg-ocean/90 disabled:bg-slate/20 disabled:cursor-not-allowed transition mb-0.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
          <div class="px-3 pb-2 flex justify-between text-[10px] text-slate/40 font-medium">
            <span>Enter para enviar · Shift+Enter nueva línea</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    AppBridge.bindAuthLinks();

    const historyList = document.getElementById('historyList');
    const messagesNode = document.getElementById('messages');
    const chatTitle = document.getElementById('chatTitle');
    const chatStatus = document.getElementById('chatStatus');
    const sidebarStatus = document.getElementById('sidebarStatus');
    const connectionState = document.getElementById('connectionState');
    const quotaInfo = document.getElementById('quotaInfo');
    const modelSelect = document.getElementById('modelSelect');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    let socket;
    let currentChatId = null;
    let histories = [];
    let currentAssistantDiv = null;

    function openSidebar() {
      sidebar.classList.remove('max-md:-translate-x-full');
      sidebarOverlay.classList.remove('hidden');
    }
    function closeSidebarFn() {
      sidebar.classList.add('max-md:-translate-x-full');
      sidebarOverlay.classList.add('hidden');
    }

    toggleSidebar.addEventListener('click', () => {
      if (sidebar.classList.contains('max-md:-translate-x-full')) openSidebar();
      else closeSidebarFn();
    });
    closeSidebar.addEventListener('click', closeSidebarFn);
    sidebarOverlay.addEventListener('click', closeSidebarFn);

    promptInput.addEventListener('input', () => {
      promptInput.style.height = 'auto';
      promptInput.style.height = promptInput.scrollHeight + 'px';
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function renderMessages(items) {
      messagesNode.innerHTML = '';
      if (!items.length) {
        messagesNode.innerHTML = `
          <div class="flex-1 flex items-center justify-center">
            <div class="text-center opacity-40">
              <p class="text-3xl font-extrabold tracking-tight">Hablar con IA</p>
              <p class="mt-2 text-sm text-slate">Elegí un modelo abajo y empezá a chatear.</p>
            </div>
          </div>`;
        return;
      }
      for (const item of items) appendMessageToUI(item.role, item.content);
      scrollToBottom();
    }

    function appendMessageToUI(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = 'max-w-3xl mx-auto w-full';

      if (role === 'user') {
        wrapper.innerHTML = `<div class="flex justify-end"><div class="bg-ocean/5 border border-ocean/10 text-ink rounded-2xl rounded-br-md px-5 py-3 text-[15px] leading-relaxed max-w-[85%] whitespace-pre-wrap">${escapeHtml(content)}</div></div>`;
      } else {
        const badge = `<div class="w-7 h-7 rounded-lg bg-gradient-to-br from-ocean to-mint flex items-center justify-center text-white text-[10px] font-extrabold shrink-0">IA</div>`;
        wrapper.innerHTML = `<div class="msg-assistant flex gap-3 items-start"><div>${badge}</div><div class="text-[15px] leading-relaxed text-ink whitespace-pre-wrap min-w-0">${escapeHtml(content)}</div></div>`;
      }

      messagesNode.appendChild(wrapper);
      return role === 'assistant' ? wrapper.querySelector('.whitespace-pre-wrap:last-child') : null;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function scrollToBottom() {
      messagesNode.scrollTop = messagesNode.scrollHeight;
    }

    function renderHistory() {
      historyList.innerHTML = histories.map(chat => `
        <button type="button" class="w-full text-left px-3 py-2.5 rounded-lg text-sm transition ${chat.chat_id === currentChatId ? 'bg-white shadow-sm font-semibold text-ink' : 'text-slate hover:bg-white/60 hover:text-ink'}" data-chat-id="${chat.chat_id}">
          <div class="truncate">${chat.title || 'Nuevo chat'}</div>
          <div class="text-[10px] mt-0.5 opacity-50">${AppBridge.formatDate(chat.updated_at)}</div>
        </button>
      `).join('');

      historyList.querySelectorAll('[data-chat-id]').forEach(node => {
        node.addEventListener('click', () => {
          const chatId = node.getAttribute('data-chat-id');
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'open_chat', chat_id: chatId }));
          }
          closeSidebarFn();
        });
      });
    }

    function updateQuota(summary) {
      if (!summary) return;
      quotaInfo.textContent = `Saldo: ${AppBridge.formatUsd(summary.remaining_usd || 0)}`;
    }

    async function loadModels() {
      try {
        const data = await AppBridge.apiFetch('/api/demo-config', { method: 'GET' });
        modelSelect.innerHTML = data.models
          .map(m => `<option value="${m.id}">${m.label}</option>`)
          .join('');
      } catch (error) {
        modelSelect.innerHTML = '<option value="">Error al cargar modelos</option>';
      }
    }

    async function openSocket() {
      try {
        const response = await AppBridge.apiFetch('/api/chat-token', {
          method: 'POST',
          headers: {
            ...(localStorage.getItem('app_access_token') ? { 'X-Access-Token': localStorage.getItem('app_access_token') } : {}),
          },
          body: JSON.stringify({
            access_token: localStorage.getItem('app_access_token') || null,
          }),
        });

        socket = new WebSocket(`${response.ws_url}?token=${encodeURIComponent(response.token)}`);
        connectionState.textContent = 'Conectando...';

        socket.addEventListener('open', () => {
          connectionState.textContent = 'Conectado';
        });

        socket.addEventListener('message', (event) => {
          const data = JSON.parse(event.data);

          if (data.type === 'init') {
            histories = data.chats || [];
            renderHistory();
            if (!histories.length) sidebarStatus.innerHTML = '<p class="px-3 text-xs text-slate/50">Sin historial.</p>';
            return;
          }

          if (data.type === 'chat_loaded') {
            currentChatId = data.chat.chat_id;
            chatTitle.textContent = data.chat.title || 'Chat';
            renderMessages(data.chat.messages || []);
            renderHistory();
            return;
          }

          if (data.type === 'assistant_thinking') {
            currentAssistantDiv = appendMessageToUI('assistant', '');
            scrollToBottom();
            return;
          }

          if (data.type === 'assistant_chunk') {
            if (currentAssistantDiv) {
              currentAssistantDiv.textContent += data.text;
              scrollToBottom();
            }
            return;
          }

          if (data.type === 'assistant_message_end') {
            currentChatId = data.chat_id || currentChatId;
            updateQuota(data.entitlement);
            currentAssistantDiv = null;
            if (currentChatId && !histories.find(c => c.chat_id === currentChatId)) {
              histories.unshift({ chat_id: currentChatId, title: data.chat_title || 'Chat', updated_at: Date.now() });
              renderHistory();
            }
            return;
          }

          if (data.type === 'error') {
            chatStatus.innerHTML = `<div class="max-w-3xl mx-auto px-4 py-2 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">${data.message}</div>`;
          }
        });

        socket.addEventListener('close', () => {
          connectionState.textContent = 'Desconectado';
        });
      } catch (error) {
        chatStatus.innerHTML = `<div class="max-w-3xl mx-auto px-4 py-2 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">${error.message}</div>`;
        connectionState.textContent = 'Sin conexión';
      }
    }

    function sendMessage() {
      const content = promptInput.value.trim();
      if (!content) return;
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        chatStatus.innerHTML = '<div class="max-w-3xl mx-auto px-4 py-2 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">El chat no está conectado.</div>';
        return;
      }

      appendMessageToUI('user', content);
      scrollToBottom();

      socket.send(JSON.stringify({
        type: 'user_message',
        chat_id: currentChatId,
        model: modelSelect.value,
        content,
      }));

      promptInput.value = '';
      promptInput.style.height = 'auto';
    }

    sendBtn.addEventListener('click', sendMessage);

    document.getElementById('newChatBtn').addEventListener('click', () => {
      currentChatId = null;
      chatTitle.textContent = 'Nuevo chat';
      renderMessages([]);
      renderHistory();
      closeSidebarFn();
    });

    loadModels();
    openSocket();
  </script>
</body>
</html>
